name: GitHub Actions Sanity Check

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  diagnostic:
    name: Quick Account Status Check
    runs-on: ubuntu-latest
    steps:
      - name: Simple Echo
        run: |
          echo "GitHub Actions is working for this account!"
          echo "Date: $(date)"
          echo "Runner: ${{ runner.os }}"
