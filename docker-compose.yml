services:
  hermes-agent:
    image: nousresearch/hermes-agent:latest
    command: ["gateway", "run"]
    tty: true
    stdin_open: true
    env_file:
      - .env
    environment:
      API_SERVER_KEY: ${API_SERVER_KEY:-}
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_ENABLED: "true"
    volumes:
      - hermes-data:/opt/data
    ports:
      - "8642:8642"

  hermes-workspace:
    image: hermes-workspace-hermes-workspace:latest
    depends_on:
      - hermes-agent
    env_file:
      - .env
    environment:
      HERMES_API_URL: http://hermes-agent:8642
      HERMES_API_TOKEN: ${API_SERVER_KEY:-}
    ports:
      - "3000:3000"

volumes:
  hermes-data:
